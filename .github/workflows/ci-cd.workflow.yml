name: CI/CD

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: main

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  PUPPETEER_SKIP_DOWNLOAD: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run lint -- --max-warnings 0
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run test
  test-it:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run test:it
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: 'arm64,arm'
      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: 'eu-central-1'
      - run: npm run deploy:prod
        env:
          REQUIRE_APPROVAL: never
          ENVIRONMENT_NAME: ${{ secrets.ENVIRONMENT_NAME }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cdk-output
          path: ./infra/cdk/cdk.output.json
  test-e2e:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cdk-output
      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: 'eu-central-1'
      - name: npm run test:e2e
        run: |
          E2E_BASE_URL=$(jq -r '.[].apiUrl' ./cdk.output.json) \
          E2E_AUTH_USER_POOL_ID=$(jq -r '.[].userPoolId' ./cdk.output.json) \
          E2E_AUTH_USER_POOL_CLIENT_ID=$(jq -r '.[].userPoolClientId' ./cdk.output.json) \
          E2E_AUTH_USER_CREDENTIALS_SECRET_NAME=$(jq -r '.[].defaultUserCredentialsSecretName' ./cdk.output.json) \
          npm run test:e2e
