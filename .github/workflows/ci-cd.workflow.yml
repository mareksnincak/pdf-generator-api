name: CI/CD
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: main
env:
  PUPPETEER_SKIP_DOWNLOAD: true
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run lint -- --max-warnings 0
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run test
  test-it:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run test:it
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: 'arm64,arm'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: 'eu-central-1'
      - run: npm run deploy:prod
        env:
          REQUIRE_APPROVAL: never
          ENVIRONMENT_NAME: ${{ secrets.ENVIRONMENT_NAME }}
      - uses: actions/upload-artifact@v4
        with:
          name: cdk-output
          path: ./infra/cdk/cdk.output.json
  test-e2e:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: cdk-output
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: 'eu-central-1'
      - name: npm run test:e2e
        run: |
          E2E_BASE_URL=$(jq -r '.[].apiUrl' ./cdk.output.json) \
          E2E_AUTH_USER_POOL_ID=$(jq -r '.[].userPoolId' ./cdk.output.json) \
          E2E_AUTH_USER_POOL_CLIENT_ID=$(jq -r '.[].userPoolClientId' ./cdk.output.json) \
          E2E_AUTH_USER_CREDENTIALS_SECRET_NAME=$(jq -r '.[].defaultUserCredentialsSecretName' ./cdk.output.json) \
          npm run test:e2e
