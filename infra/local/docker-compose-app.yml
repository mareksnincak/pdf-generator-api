name: pdf-generator-api
services:
  floci:
    image: hectorvent/floci@sha256:11a6cbf733b147700b0b9fcf71d3e6491a33302be453a96f52918cbad68551ee # v1.3.0
    ports:
      - '4566:4566'
    environment:
      AWS_DEFAULT_REGION: 'eu-central-1'
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      FLOCI_STORAGE_MODE: persistent
      FLOCI_STORAGE_PERSISTENT_PATH: /app/data
    volumes:
      - './volumes/floci:/app/data'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4566/_floci/health || exit 1']
      interval: 1s
      timeout: 3s
      retries: 10
    networks:
      - local
  dynamodb-local:
    command: '-jar DynamoDBLocal.jar -sharedDb -dbPath ./data'
    image: amazon/dynamodb-local@sha256:d89f8fcc6b1a39cb35976c248ed42a28c66ae00dc043099210f5571e42648ab4 # v3.3.0
    ports:
      - '8000:8000'
    volumes:
      - './volumes/dynamodb:/home/dynamodblocal/data'
    working_dir: /home/dynamodblocal
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'if [ "$(curl -s -o /dev/null -I -w ''%{http_code}'' http://localhost:8000)" == "400" ]; then exit 0; else exit 1; fi',
        ]
      interval: 1s
      timeout: 3s
      retries: 10
    networks:
      - local
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin@sha256:46d9c7f5234688481a807987113ab068acaa11fd7057c9bb84ef181f492a0194 # v5.1.3
    ports:
      - '8001:8001'
    environment:
      DYNAMO_ENDPOINT: 'http://dynamodb-local:8000'
      AWS_REGION: 'eu-central-1'
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    depends_on:
      dynamodb-local:
        condition: service_healthy
    networks:
      - local

networks:
  local:
    name: pdf-generator-api
